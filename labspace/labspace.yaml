    contentPath: 01-introduction.md
  - title: Prerequisites & Setup
    contentPath: 02-setup.md
  - title: "Lab 1 — Standard Image vs Docker Hardened Images"
    contentPath: 03-lab-migrate-dhi.md
  - title: "Lab 2 — Secure Software Supply Chain (SBOM · VEX · SLSA)"
    contentPath: 04-lab-sbom-attestations.md
  - title: "Lab 3 — Securing Your CI Pipeline"
    contentPath: 05-lab-ci-policy.md
  - title: "Lab 4 — Securing the Agentic Stack (MCP on DHI)"
    contentPath: 06-lab-mcp-dhi.md
  - title: Conclusion & Next Steps
    contentPath: 07-conclusion.md

