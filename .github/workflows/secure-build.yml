name: Secure Build

# The complete secure CI pipeline for Lab 3:
#   CHECKOUT → BUILD (DHI) → ATTEST → POLICY (Scout gate) → PUSH → SIGN (Cosign keyless)
#
# The Docker Scout policy step is a HARD gate — `exit-code: true` stops the
# pipeline and nothing is pushed if any policy fails. Signing is keyless: the
# GitHub OIDC token is exchanged for a short-lived Sigstore certificate, so
# there are no private keys to manage.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — SLSA provenance + Cosign keyless signing
      contents: read

    steps:
      # 1. CHECKOUT
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # 2. BUILD (DHI base)  +  3. ATTEST (SBOM + provenance)
      # Build locally first so the Scout gate runs BEFORE anything is pushed.
      - name: Build with SBOM and provenance
        id: build
        uses: docker/build-push-action@v6
        with:
          context: lab/03-policy
          push: false
          load: true
          sbom: true
          provenance: mode=max
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:${{ github.sha }}

      # 4. POLICY — Docker Scout hard gate
      - name: Docker Scout policy check
        uses: docker/scout-action@v1
        with:
          command: compare
          image: ${{ steps.build.outputs.imageid }}
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          exit-code: true        # ← fails the build if policy not met

      # 5. PUSH — only reached if the gate passed. Capture the digest for signing.
      - name: Push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: lab/03-policy
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:latest

      # 6. SIGN — Cosign keyless (no keys to manage)
      - name: Sign with Cosign (keyless, OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service@${DIGEST}
