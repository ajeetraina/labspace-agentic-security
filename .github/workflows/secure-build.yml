name: Secure Build

# The complete secure CI pipeline for Lab 3:
#   CHECKOUT → BUILD (DHI) → ATTEST → POLICY (Scout gate) → SIGN → PUSH
#
# The Docker Scout policy step is a HARD gate — `exit-code: true` stops the
# pipeline and nothing reaches the registry if any policy fails.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — needed for SLSA L2 provenance + signing
      contents: read

    steps:
      # 1. CHECKOUT
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. BUILD (DHI base)  +  3. ATTEST (SBOM + provenance)
      - name: Build with SBOM and provenance
        id: build
        uses: docker/build-push-action@v6
        with:
          context: lab/03-policy
          push: false
          load: true
          sbom: true
          provenance: mode=max
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:${{ github.sha }}

      # 4. POLICY — Docker Scout hard gate
      - name: Docker Scout policy check
        uses: docker/scout-action@v1
        with:
          command: compare
          image: ${{ steps.build.outputs.imageid }}
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          exit-code: true        # ← fails the build if policy not met

      # 5. SIGN
      - name: Sign with Notation
        run: |
          notation sign \
            ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:${{ github.sha }}

      # 6. PUSH — only signed, attested images reach the registry
      - name: Push signed image
        uses: docker/build-push-action@v6
        with:
          context: lab/03-policy
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:latest
