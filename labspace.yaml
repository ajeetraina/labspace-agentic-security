metadata:
  id: docker/workshop-agentic-security
  sourceRepo: github.com/docker/workshop-agentic-security
  contentVersion: v1.0.0

title: "Securing the Agentic Stack: Docker Hardened Images & Supply Chain Security"
description: |
  A 90-minute hands-on workshop covering supply chain security fundamentals
  (SBOM, VEX, SLSA) and applying them to both traditional container workloads
  and agentic MCP servers. Uses the catalog-service-node app as the running
  example throughout.

sections:
  - title: Introduction
    contentPath: labspace/01-introduction.md
  - title: Setup
    contentPath: labspace/02-setup.md
  - title: "Lab 1 — Migrate to Docker Hardened Images"
    contentPath: labspace/03-lab-migrate-dhi.md
  - title: "Lab 2 — SBOM Generation & Signature Verification"
    contentPath: labspace/04-lab-sbom-attestations.md
  - title: "Lab 3 — CI Policy Enforcement (GitHub Actions)"
    contentPath: labspace/05-lab-ci-policy.md
  - title: "Lab 4 — MCP Server on Docker Hardened Images"
    contentPath: labspace/06-lab-mcp-dhi.md
  - title: Conclusion & Next Steps
    contentPath: labspace/07-conclusion.md

services:
